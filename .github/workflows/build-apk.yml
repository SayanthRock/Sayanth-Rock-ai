name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate and sync Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Prepare APK artifact
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-output/SayanthRockAI-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SayanthRockAI-debug
          path: apk-output/SayanthRockAI-debug.apk
          if-no-files-found: error
